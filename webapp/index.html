<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Betfair Handicap Viewer</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Betfair Handicap Viewer</h1>
    <div class="actions">
      <button id="refreshBtn" type="button">Refresh</button>
      <span id="statusText">Loading...</span>
    </div>
  </header>

  <main>
    <section id="calendarTab">
      <section class="day-nav">
        <button id="prevDayBtn" type="button">Previous Day</button>
        <h2 id="dayLabel">Day</h2>
        <button id="nextDayBtn" type="button">Next Day</button>
      </section>
      <section class="table-controls">
        <label for="leagueFilterBtn" class="control-label">Leagues</label>
        <div class="league-filter" id="leagueFilter">
          <button id="leagueFilterBtn" type="button" aria-haspopup="true" aria-expanded="false">All Leagues</button>
          <div id="leagueFilterMenu" class="league-filter-menu hidden" role="menu" aria-label="League filter options"></div>
        </div>
        <label for="tierFilterBtn" class="control-label">Tier</label>
        <div class="league-filter" id="tierFilter">
          <button id="tierFilterBtn" type="button" aria-haspopup="true" aria-expanded="false">All Tiers</button>
          <div id="tierFilterMenu" class="league-filter-menu hidden" role="menu" aria-label="Tier filter options"></div>
        </div>
        <button id="sortModeBtn" type="button">Sort: Kickoff</button>
      </section>
      <section id="calendarView" class="calendar-view"></section>
    </section>
  </main>

  <aside id="detailsPanel" class="details-panel hidden" aria-live="polite">
    <div class="details-header">
      <h2 id="detailsTitle">Game</h2>
      <div class="details-actions">
        <button id="recalcBtn" type="button">Recalculate xGD</button>
        <button id="closeDetails" type="button">Close</button>
      </div>
    </div>
    <p id="detailsMeta" class="meta"></p>
    <div id="linesContainer"></div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
