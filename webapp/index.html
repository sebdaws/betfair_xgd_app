<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Football Handicap Viewer</title>
  <script>
    (() => {
      const stored = window.localStorage && window.localStorage.getItem("xgd_theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = stored === "light" || stored === "dark" ? stored : (prefersDark ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Football Handicap Viewer</h1>
      <span id="statusText" class="topbar-status">Loading...</span>
    </div>
    <div class="topbar-right">
      <button id="settingsOpenBtn" type="button" class="settings-open-btn" aria-haspopup="dialog" aria-controls="settingsSidebar" aria-expanded="false">Settings</button>
    </div>
  </header>

  <div id="settingsOverlay" class="settings-overlay hidden" aria-hidden="true"></div>
  <aside id="settingsSidebar" class="settings-sidebar hidden" aria-label="Settings panel" aria-modal="true" role="dialog">
    <div class="settings-sidebar-header">
      <h2>Settings</h2>
      <button id="settingsCloseBtn" type="button" class="settings-close-btn" aria-label="Close settings">Close</button>
    </div>
    <div class="actions settings-actions">
      <button id="refreshBtn" type="button">Refresh Betfair Odds</button>
      <label class="topbar-threshold-field" for="xgThresholdInput">
        <span>xG Threshold</span>
        <input
          id="xgThresholdInput"
          type="text"
          inputmode="decimal"
          value="0.10"
          aria-label="xG threshold for handicap performance and highlights"
          autocomplete="off"
        />
      </label>
      <button id="xgMetricModeToggleBtn" type="button" class="topbar-highlight-toggle-btn">xG Mode: xG</button>
      <button id="xgdHcHighlightToggleBtn" type="button" class="topbar-highlight-toggle-btn">Highlight</button>
      <button id="noHandicapGamesToggleBtn" type="button" class="topbar-highlight-toggle-btn">No-HC Games: Show</button>
      <button id="themeToggleBtn" type="button" class="topbar-highlight-toggle-btn" aria-label="Switch color theme">Theme: Light</button>
      <button id="hardRefreshXgdBtn" type="button" class="topbar-highlight-toggle-btn">Hard Refresh xGD</button>
      <button id="exitAppBtn" type="button" class="topbar-exit-btn">Exit App</button>
    </div>
  </aside>

  <main>
    <section class="page-tabs">
      <button id="gamesTabBtn" class="tab-btn active" type="button">Games</button>
      <button id="modellingPricesTabBtn" class="tab-btn" type="button">Modelling Prices</button>
      <button id="teamHcRankingsTabBtn" class="tab-btn" type="button">HC Rankings</button>
      <button id="teamsTabBtn" class="tab-btn" type="button">Teams</button>
      <button id="matchupTabBtn" class="tab-btn" type="button">Matchup</button>
      <button id="manualMappingTabBtn" class="tab-btn" type="button">Mapping</button>
    </section>

    <section id="gamesTabPane" class="tab-pane">
      <section id="gamesPaneTabs" class="page-tabs page-sub-tabs">
        <button id="gamesMainSubTabBtn" class="tab-btn active" type="button">Games</button>
        <button id="savedGamesSubTabBtn" class="tab-btn" type="button">Saved Games</button>
      </section>
      <section id="gamesDayToolbar" class="day-toolbar">
        <section class="day-actions">
          <button id="upcomingModeBtn" type="button" class="mode-btn active">Upcoming</button>
          <button id="historicalModeBtn" type="button" class="mode-btn">Historical</button>
          <button id="todayBtn" type="button">Today</button>
        </section>
        <section class="day-nav">
          <button id="prevDayBtn" type="button">Previous Day</button>
          <h2 id="dayLabel">Day</h2>
          <button id="nextDayBtn" type="button">Next Day</button>
          <label class="day-picker-wrap" for="dayPickerInput">
            <span>Jump to</span>
            <input id="dayPickerInput" type="date" aria-label="Jump to date" />
            <span id="dayPickerCount" class="day-picker-count"></span>
          </label>
        </section>
      </section>
      <section class="table-controls">
        <label for="leagueFilterBtn" class="control-label">Leagues</label>
        <div class="league-filter" id="leagueFilter">
          <button id="leagueFilterBtn" type="button" aria-haspopup="true" aria-expanded="false">All Leagues</button>
          <div id="leagueFilterMenu" class="league-filter-menu hidden" role="menu" aria-label="League filter options"></div>
        </div>
        <label for="tierFilterBtn" class="control-label">Tier</label>
        <div class="league-filter" id="tierFilter">
          <button id="tierFilterBtn" type="button" aria-haspopup="true" aria-expanded="false">All Tiers</button>
          <div id="tierFilterMenu" class="league-filter-menu hidden" role="menu" aria-label="Tier filter options"></div>
        </div>
        <label for="sortModeBtn" class="control-label">Sort</label>
        <select id="sortModeBtn" aria-label="Sort games">
          <option value="kickoff">Kickoff</option>
          <option value="league">League</option>
          <option value="tier">Tier</option>
        </select>
        <label for="teamSearchInput" class="control-label">Team</label>
        <input
          id="teamSearchInput"
          class="team-search-input"
          type="search"
          aria-label="Search teams"
          placeholder="Search team..."
          autocomplete="off"
        />
        <label
          for="modelEdgeInput"
          id="modelEdgeLabel"
          class="control-label modelling-edge-control hidden"
        >Edge</label>
        <input
          id="modelEdgeInput"
          class="modelling-edge-input modelling-edge-control hidden"
          type="text"
          inputmode="decimal"
          aria-label="Model edge adjustment for bold highlight logic"
          value="0"
          autocomplete="off"
        />
      </section>
      <section id="calendarView" class="calendar-view"></section>

      <section id="savedGamesPane" class="hidden">
        <section class="table-controls saved-games-controls">
          <label for="savedSortModeBtn" class="control-label">Sort</label>
          <select id="savedSortModeBtn" aria-label="Sort saved games">
            <option value="kickoff">Kickoff</option>
            <option value="league">League</option>
            <option value="tier">Tier</option>
          </select>
        </section>
        <section id="savedGamesView" class="calendar-view"></section>
      </section>
    </section>

    <section id="teamHcRankingsTabPane" class="tab-pane hidden">
      <section class="page-tabs mapping-sub-tabs">
        <button id="teamHcRankingsGeneralTabBtn" class="tab-btn active" type="button">General</button>
        <button id="teamHcRankingsHomeTabBtn" class="tab-btn" type="button">Home</button>
        <button id="teamHcRankingsAwayTabBtn" class="tab-btn" type="button">Away</button>
      </section>
      <section class="table-controls">
        <label for="teamHcRankingsSortSelect" class="control-label">Rank By</label>
        <select id="teamHcRankingsSortSelect" aria-label="Rank teams by handicap performance">
          <option value="result">Result</option>
          <option value="xg">xG</option>
          <option value="pnl">PnL (For)</option>
          <option value="pnl_against">PnL (Against)</option>
        </select>
        <label for="teamHcRankingsCompetitionSelect" class="control-label">Competition</label>
        <select id="teamHcRankingsCompetitionSelect" aria-label="HC rankings competition"></select>
        <label for="teamHcRankingsSeasonSelect" class="control-label">Season</label>
        <select id="teamHcRankingsSeasonSelect" aria-label="HC rankings season"></select>
        <button id="teamHcRankingsRefreshBtn" type="button">Refresh Rankings</button>
      </section>
      <section id="teamHcRankingsView" class="calendar-view"></section>
    </section>

    <section id="teamsTabPane" class="tab-pane hidden">
      <section class="table-controls">
        <label for="teamsSearchInput" class="control-label">Team</label>
        <input
          id="teamsSearchInput"
          class="team-search-input"
          type="search"
          aria-label="Search teams directory"
          placeholder="Search team..."
          autocomplete="off"
        />
        <button id="teamsRefreshBtn" type="button">Refresh Teams</button>
      </section>
      <section id="teamsView" class="calendar-view"></section>
    </section>

    <section id="matchupTabPane" class="tab-pane hidden">
      <section class="table-controls matchup-controls">
        <label for="matchupHomeInput" class="control-label">Home</label>
        <input
          id="matchupHomeInput"
          class="team-search-input"
          type="search"
          aria-label="Matchup home team"
          placeholder="Home team"
          list="matchupTeamsList"
          autocomplete="off"
        />
        <label for="matchupAwayInput" class="control-label">Away</label>
        <input
          id="matchupAwayInput"
          class="team-search-input"
          type="search"
          aria-label="Matchup away team"
          placeholder="Away team"
          list="matchupTeamsList"
          autocomplete="off"
        />
        <label for="matchupCompetitionSelect" class="control-label">League</label>
        <select id="matchupCompetitionSelect" aria-label="Matchup competition">
          <option value="">Auto</option>
        </select>
        <button id="matchupRunBtn" type="button">Build Matchup</button>
      </section>
      <datalist id="matchupTeamsList"></datalist>
      <section id="matchupView" class="calendar-view matchup-view"></section>
    </section>

    <section id="manualMappingTabPane" class="tab-pane hidden">
      <section class="mapping-header">
        <h2>Mapping</h2>
        <div class="mapping-header-actions">
          <button id="mappingSaveSelectedBtn" type="button">Save Selected Mappings</button>
          <button id="mappingClearSelectedBtn" type="button">Clear Selection</button>
          <button id="mappingRefreshBtn" type="button">Refresh Mapping Data</button>
        </div>
      </section>
      <p id="mappingStatus" class="mapping-status">Loading mapping data...</p>

      <section class="page-tabs mapping-sub-tabs">
        <button id="teamMappingsSubTabBtn" class="tab-btn active" type="button">Teams</button>
        <button id="competitionMappingsSubTabBtn" class="tab-btn" type="button">Competitions</button>
      </section>

      <section id="teamMappingsPane" class="mapping-sub-pane">
        <section class="mapping-panel">
          <h3>Unmatched Teams</h3>
          <div id="unmatchedTeamsContainer"></div>
        </section>

        <section class="mapping-panel">
          <h3>Saved Team Mappings</h3>
          <div id="savedMappingsContainer"></div>
        </section>
      </section>

      <section id="competitionMappingsPane" class="mapping-sub-pane hidden">
        <section class="mapping-panel">
          <h3>Unmatched Competitions</h3>
          <div id="unmatchedCompetitionsContainer"></div>
        </section>

        <section class="mapping-panel">
          <h3>Saved Competition Mappings</h3>
          <div id="savedCompetitionMappingsContainer"></div>
        </section>
      </section>
    </section>
  </main>

  <aside id="detailsPanel" class="details-panel hidden" aria-live="polite">
    <div class="details-header">
      <h2 id="detailsTitle">Game</h2>
      <div class="details-actions">
        <button id="detailsXgMetricModeToggleBtn" type="button" class="topbar-highlight-toggle-btn details-metric-toggle-btn">xGD Mode: xGD</button>
        <button id="saveGameBtn" type="button">Save</button>
        <button id="closeDetails" type="button">Close</button>
      </div>
    </div>
    <p id="detailsMeta" class="meta"></p>
    <div id="linesContainer"></div>
  </aside>

  <aside id="teamDetailsPanel" class="details-panel hidden" aria-live="polite">
    <div class="details-header">
      <h2 id="teamDetailsTitle">Team</h2>
      <div class="details-actions">
        <label class="team-panel-league-field" for="teamDetailsSeasonSelect">
          <span>Season</span>
          <select id="teamDetailsSeasonSelect" aria-label="Team page season"></select>
        </label>
        <label class="team-panel-league-field" for="teamDetailsCompetitionSelect">
          <span>League</span>
          <select id="teamDetailsCompetitionSelect" aria-label="Team page league"></select>
        </label>
        <button id="teamDetailsXgMetricModeToggleBtn" type="button" class="topbar-highlight-toggle-btn details-metric-toggle-btn">xGD Mode: xGD</button>
        <button id="teamDetailsCloseBtn" type="button">Close</button>
      </div>
    </div>
    <p id="teamDetailsMeta" class="meta"></p>
    <div id="teamDetailsContent"></div>
  </aside>

  <aside id="teamHcPerfPanel" class="details-panel hidden" aria-live="polite">
    <div class="details-header">
      <h2 id="teamHcPerfTitle">Team HC Performance</h2>
      <div class="details-actions">
        <button id="teamHcPerfCloseBtn" type="button">Close</button>
      </div>
    </div>
    <p id="teamHcPerfMeta" class="meta"></p>
    <div id="teamHcPerfContent"></div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
